syntax = "proto3";

package admin_user;

option java_multiple_files = true;
option java_package = "com.mdb.user_data_gateway_service.grpc";
option java_outer_classname = "AdminUserServiceProto";

message AdminUserRegisterRequest {
    string username = 1;
    string email = 2;
    string password = 3;
}

message AdminUserRegisterResponse {
    bool success = 1;
    string message = 2;
    string id = 3;
}

message AdminUserLoginRequest {
    string username_or_email = 1;
    string password = 2;
}

message AdminUserResponse {
    string id = 1;
    string username = 2;
    string email = 3;
    string status = 4;
    int64 created_at = 5;
    int64 updated_at = 6;
}

message GetAdminUsersRequest {
    int32 page = 1;
    int32 size = 2;
}

message GetAdminUsersResponse {
    repeated AdminUserResponse users = 1;
    int64 total_elements = 2;
    int32 total_pages = 3;
}

service AdminUserService {
    rpc RegisterAdmin(AdminUserRegisterRequest) returns (AdminUserRegisterResponse);
    rpc LoginAdmin(AdminUserLoginRequest) returns (AdminUserResponse);
    rpc GetAdminUsers(GetAdminUsersRequest) returns (GetAdminUsersResponse);
}
