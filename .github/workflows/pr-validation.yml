name: PR Validation

on:
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Compile
        run: mvn clean compile -Pcli

      - name: Run Tests
        run: mvn test -Pcli
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key-at-least-32-characters-long' }}
        continue-on-error: true
    
      - name: Validate Docker Build
        run: docker build .